<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<style>

.chart-buttons{
display:flex;
gap:10px;
margin-bottom:20px;
}

.widgets{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.widget{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
height:300px;
}

.widget canvas{
width:95% !important;
height:87% !important;
}

.kpi-widget{
height:auto;
min-height:120px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.kpi-title{
font-size:14px;
color:#888;
margin-bottom:8px;
}

.kpi-value{
font-size:36px;
font-weight:bold;
color:#333;
}

.kpi-change{
font-size:13px;
margin-top:6px;
}

.widget-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
width:100%;
}

.widget-title{
font-size:13px;
font-weight:600;
color:#555;
}

.remove-btn{
background:none;
border:none;
cursor:pointer;
font-size:16px;
padding:0;
}

button {
padding: 8px 18px;
background-color: #555;
color: white;
border: none;
border-radius: 4px;
cursor: pointer;
font-size: 14px;
}

button:hover {
background-color: #333;
}

a {
color: white;
text-decoration: none;
}

</style>

</head>

<body>

<h2>Customer Dashboard Builder</h2>

<button><a href="index.html" style="color: white;">Customer Orders</a></button>
<br><br>

<div class="chart-buttons">
  <button onclick="addChart('bar')">▤ Bar Chart</button>
  <button onclick="addChart('pie')">◔ Pie Chart</button>
  <button onclick="addChart('line')">⤴ Line Chart</button>
  <button onclick="addChart('table')">☰ Table</button>
  <button onclick="addChart('kpi')">◎ KPI Widget</button>
</div>

<div id="widgets" class="widgets"></div>

<script>

function getOrders() {
  return JSON.parse(localStorage.getItem('orders')) || [
    { id: 1773720471192, first: 'json', last: 'smith', phone: '7891234560', email: 'jsonsmith@gmail.com', qty: 2, price: 800, status: 'Paid' },
    { id: 1773739185102, first: 'sam', last: 'v', phone: '8901234567', email: 'samualv@gmail.com', qty: 1, price: 400, status: 'Paid' },
    { id: 1773739263441, first: 'john', last: 's', phone: '9012345678', email: 'johnsnow@gmail.com', qty: 4, price: 1600, status: 'Paid' },
    { id: 1773739332463, first: 'wikki', last: 's', phone: '7654321890', email: 'wikkiofficial@gmail.com', qty: 3, price: 1200, status: 'Paid' },
    { id: 1773739416656, first: 'brandon', last: 'king', phone: '8765432109', email: 'branstark@gmail.com', qty: 2, price: 800, status: 'Paid' }
  ];
}

function getKPIData() {
  const orders = getOrders();
  const totalOrders = orders.length;
  const totalRevenue = orders.reduce((sum, o) => sum + o.price, 0);
  const totalQty = orders.reduce((sum, o) => sum + o.qty, 0);
  const paidOrders = orders.filter(o => o.status === 'Paid').length;
  const pendingOrders = orders.filter(o => o.status === 'Pending').length;
  const avgOrderValue = totalOrders > 0 ? Math.round(totalRevenue / totalOrders) : 0;

  return [
    { title: 'Total Orders', value: totalOrders, change: '+2 this week', trend: 'up' },
    { title: 'Total Revenue', value: '₹' + totalRevenue, change: '+₹400 this week', trend: 'up' },
    { title: 'Total Qty Sold', value: totalQty, change: '+3 this week', trend: 'up' },
    { title: 'Paid Orders', value: paidOrders, change: paidOrders + ' of ' + totalOrders, trend: 'up' },
    { title: 'Pending Orders', value: pendingOrders, change: pendingOrders + ' pending', trend: pendingOrders > 0 ? 'down' : 'up' },
    { title: 'Avg Order Value', value: '₹' + avgOrderValue, change: 'Per order avg', trend: 'up' },
  ];
}

function getChartData() {
  const orders = getOrders();
  const labels = orders.map(o => o.first + ' ' + o.last);
  const prices = orders.map(o => o.price);
  const colors = ["#c0bfe9ff","#c0ece9ff","#121c58ff","#7a777aff","#c4b4caff","#86efac"];
  return { labels, prices, colors };
}

let widgetCount = 0;
let kpiIndex = 0;

function addChart(type) {
  const container = document.getElementById('widgets');
  const id = 'widget-' + widgetCount++;
  const div = document.createElement('div');
  div.className = 'widget' + (type === 'kpi' ? ' kpi-widget' : '');
  div.id = id;

  if (type === 'kpi') {
    const kpis = getKPIData();
    const kpi = kpis[kpiIndex % kpis.length];
    kpiIndex++;

    div.innerHTML = `
      <div class="widget-header">
        <span class="widget-title">KPI</span>
        <button class="remove-btn" onclick="removeWidget('${id}')">🗑️</button>
      </div>
      <div class="kpi-title">${kpi.title}</div>
      <div class="kpi-value">${kpi.value}</div>
      <div class="kpi-change">${kpi.trend === 'up' ? '▲' : '▼'} ${kpi.change}</div>
    `;

  } else if (type === 'table') {
    const orders = getOrders();
    let rows = orders.map(o => `
      <tr>
        <td>${o.first} ${o.last}</td>
        <td>${o.qty}</td>
        <td>₹${o.price}</td>
        <td>${o.status}</td>
      </tr>
    `).join('');

    div.style.height = 'auto';
    div.innerHTML = `
      <div class="widget-header">
        <span class="widget-title">Orders Table</span>
        <button class="remove-btn" onclick="removeWidget('${id}')">🗑️</button>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead style="background:#f5f5f5;">
          <tr>
            <th style="padding:6px;text-align:left;">Name</th>
            <th style="padding:6px;text-align:center;">Qty</th>
            <th style="padding:6px;text-align:center;">Price</th>
            <th style="padding:6px;text-align:center;">Status</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;

  } else {
    const canvasId = 'canvas-' + id;
    div.innerHTML = `
      <div class="widget-header">
        <span class="widget-title">${type.charAt(0).toUpperCase() + type.slice(1)} Chart</span>
        <button class="remove-btn" onclick="removeWidget('${id}')">🗑️</button>
      </div>
      <canvas id="${canvasId}"></canvas>
    `;
    container.appendChild(div);

    const { labels, prices, colors } = getChartData();
    const ctx = document.getElementById(canvasId).getContext('2d');

    new Chart(ctx, {
      type: type,
      data: {
        labels: labels,
        datasets: [{
          label: 'Revenue (₹)',
          data: prices,
          backgroundColor: colors,
          borderColor: colors,
          borderWidth: 2,
          fill: type === 'line' ? false : true,
          tension: 0.4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: type === 'pie' }
        }
      }
    });
    return;
  }

  container.appendChild(div);
}

function removeWidget(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

Sortable.create(document.getElementById('widgets'), {
  animation: 150
});

</script>

</body>
</html>

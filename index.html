<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #e8f5e9;
      padding: 30px;
      color: #333;
    }

    h2 {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .search-bar {
      margin-bottom: 15px;
    }

    .search-bar input {
      width: 280px;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 8px 18px;
      background-color: #555;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover { background-color: #333; }

    a { color: white; text-decoration: none; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    thead { background-color: #f5f5f5; }

    th, td {
      padding: 12px 16px;
      text-align: center;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    th { font-weight: 600; }
    tr:last-child td { border-bottom: none; }
    tr:hover { background-color: #f9f9f9; }

    .action-btns {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }

    .modal.active { display: flex; }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 350px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .modal-content h3 { font-size: 18px; margin-bottom: 5px; }

    .modal-content input,
    .modal-content select {
      padding: 9px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      width: 100%;
    }

    .modal-buttons { display: flex; gap: 10px; }
    .modal-buttons button { flex: 1; }
    .cancel-btn { background-color: #aaa; }
    .cancel-btn:hover { background-color: #888; }
  </style>
</head>
<body>

  <h2>Customer Orders</h2>

  <div class="search-bar">
    <input id="search" placeholder="Search customer... 🔍" onkeyup="searchOrders()">
  </div>

  <div class="btn-group">
    <button><a href="dashboard.html">Dashboard</a></button>
    <button onclick="openForm()">Create Order</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Qty</th>
        <th>Price</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="orders"></tbody>
  </table>

  <div id="formModal" class="modal">
    <div class="modal-content">
      <h3 id="formTitle">Create Order</h3>
      <input id="first" placeholder="First Name">
      <input id="last" placeholder="Last Name">
      <input id="phone" placeholder="Phone">
      <input id="email" placeholder="Email">
      <input id="qty" placeholder="Quantity" type="number">
      <input id="price" placeholder="Price" type="number">
      <select id="status">
        <option>Paid</option>
        <option>Pending</option>
      </select>
      <div class="modal-buttons">
        <button onclick="saveOrder()">Save</button>
        <button class="cancel-btn" onclick="closeForm()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    let orders = JSON.parse(localStorage.getItem('orders')) || [
      { id: 1773720471192, first: 'json', last: 'smith', phone: '7891234560', email: 'jsonsmith@gmail.com', qty: 2, price: 800, status: 'Paid' },
      { id: 1773739185102, first: 'sam', last: 'v', phone: '8901234567', email: 'samualv@gmail.com', qty: 1, price: 400, status: 'Paid' },
      { id: 1773739263441, first: 'john', last: 's', phone: '9012345678', email: 'johnsnow@gmail.com', qty: 4, price: 1600, status: 'Paid' },
      { id: 1773739332463, first: 'wikki', last: 's', phone: '7654321890', email: 'wikkiofficial@gmail.com', qty: 3, price: 1200, status: 'Paid' },
      { id: 1773739416656, first: 'brandon', last: 'king', phone: '8765432109', email: 'branstark@gmail.com', qty: 2, price: 800, status: 'Paid' }
    ];

    let editingId = null;

    function saveToStorage() {
      localStorage.setItem('orders', JSON.stringify(orders));
    }

    function renderOrders(list) {
      const tbody = document.getElementById('orders');
      tbody.innerHTML = '';
      list.forEach(order => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${order.id}</td>
          <td>${order.first} ${order.last}</td>
          <td>${order.phone}</td>
          <td>${order.email}</td>
          <td>${order.qty}</td>
          <td>${order.price}</td>
          <td>${order.status}</td>
          <td>
            <div class="action-btns">
              <button onclick="editOrder(${order.id})">Edit</button>
              <button onclick="deleteOrder(${order.id})">Delete</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function searchOrders() {
      const query = document.getElementById('search').value.toLowerCase();
      const filtered = orders.filter(o =>
        (o.first + ' ' + o.last).toLowerCase().includes(query) ||
        o.email.toLowerCase().includes(query) ||
        o.phone.includes(query)
      );
      renderOrders(filtered);
    }

    function openForm() {
      editingId = null;
      document.getElementById('formTitle').textContent = 'Create Order';
      ['first','last','phone','email','qty','price'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('status').value = 'Paid';
      document.getElementById('formModal').classList.add('active');
    }

    function closeForm() {
      document.getElementById('formModal').classList.remove('active');
    }

    function saveOrder() {
      const first = document.getElementById('first').value.trim();
      const last = document.getElementById('last').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const qty = parseInt(document.getElementById('qty').value);
      const price = parseInt(document.getElementById('price').value);
      const status = document.getElementById('status').value;

      if (!first || !last || !phone || !email || !qty || !price) {
        alert('Please fill all fields!');
        return;
      }

      if (editingId !== null) {
        const index = orders.findIndex(o => o.id === editingId);
        orders[index] = { id: editingId, first, last, phone, email, qty, price, status };
      } else {
        orders.push({ id: Date.now(), first, last, phone, email, qty, price, status });
      }

      saveToStorage();
      renderOrders(orders);
      closeForm();
    }

    function editOrder(id) {
      const order = orders.find(o => o.id === id);
      if (!order) return;
      editingId = id;
      document.getElementById('formTitle').textContent = 'Edit Order';
      document.getElementById('first').value = order.first;
      document.getElementById('last').value = order.last;
      document.getElementById('phone').value = order.phone;
      document.getElementById('email').value = order.email;
      document.getElementById('qty').value = order.qty;
      document.getElementById('price').value = order.price;
      document.getElementById('status').value = order.status;
      document.getElementById('formModal').classList.add('active');
    }

    function deleteOrder(id) {
      if (confirm('Delete this order?')) {
        orders = orders.filter(o => o.id !== id);
        saveToStorage();
        renderOrders(orders);
      }
    }

    renderOrders(orders);
  </script>

</body>
</html>
